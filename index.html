<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>برنامج الجرد</title>

<style>
body {
  font-family: Arial;
  padding: 15px;
  direction: rtl;
  background: #f5f6fa;
}

h2 {
  text-align: center;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 0 10px #ddd;
}

input, select, textarea {
  width: 100%;
  margin: 8px 0;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
}

.add {
  background: #27ae60;
  color: white;
}

.export {
  background: #2980b9;
  color: white;
}

table {
  width: 100%;
  margin-top: 15px;
  border-collapse: collapse;
  background: white;
}

th {
  background: #2c3e50;
  color: white;
}

td, th {
  padding: 8px;
  border: 1px solid #ddd;
  text-align: center;
}
</style>

</head>

<body>

<h2>📦 برنامج الجرد</h2>

<div class="card">

<label>التاريخ:</label>
<input type="text" id="date" readonly>

<label>المستودع:</label>
<select id="warehouse">
  <option>عنتاب</option>
  <option>باشبينر</option>
</select>

<label>اسم المادة:</label>
<input type="text" id="item">

<label>الكمية:</label>
<input type="number" id="qty">

<label>ملاحظات:</label>
<textarea id="notes"></textarea>

<button class="add" onclick="addItem()">➕ إضافة</button>
<button class="export" onclick="downloadCSV()">📊 تحميل Excel</button>

</div>

<table>
<thead>
<tr>
<th>تاريخ</th>
<th>مستودع</th>
<th>مادة</th>
<th>كمية</th>
<th>ملاحظات</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
document.getElementById("date").value = new Date().toLocaleDateString();

let data = JSON.parse(localStorage.getItem("inventory") || "[]");

function addItem() {
  let item = {
    date: document.getElementById("date").value,
    warehouse: document.getElementById("warehouse").value,
    name: document.getElementById("item").value,
    qty: document.getElementById("qty").value,
    notes: document.getElementById("notes").value
  };

  data.push(item);
  localStorage.setItem("inventory", JSON.stringify(data));

  render();
}

function render() {
  let table = document.getElementById("table");
  table.innerHTML = "";

  data.forEach(d => {
    table.innerHTML += `
      <tr>
        <td>${d.date}</td>
        <td>${d.warehouse}</td>
        <td>${d.name}</td>
        <td>${d.qty}</td>
        <td>${d.notes}</td>
      </tr>
    `;
  });
}

function downloadCSV() {
  let csv = "تاريخ,مستودع,مادة,كمية,ملاحظات\n";

  data.forEach(d => {
    csv += `${d.date},${d.warehouse},${d.name},${d.qty},${d.notes}\n`;
  });

  let blob = new Blob([csv], { type: 'text/csv' });
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "inventory.csv";
  a.click();
}

render();
</script>

</body>
</html>
