<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>برنامج الجرد</title>

<style>
body {
  font-family: Arial;
  padding: 15px;
  direction: rtl;
  background: #f5f6fa;
}

h2 {
  text-align: center;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 0 10px #ddd;
}

input, select, textarea {
  width: 100%;
  margin: 8px 0;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
}

.add {
  background: #27ae60;
  color: white;
}

.export {
  background: #2980b9;
  color: white;
}

table {
  width: 100%;
  margin-top: 15px;
  border-collapse: collapse;
  background: white;
}

th {
  background: #2c3e50;
  color: white;
}

td, th {
  padding: 8px;
  border: 1px solid #ddd;
  text-align: center;
}
</style>

</head>

<body>

<h2>📦 برنامج الجرد</h2>

<div class="card">

<label>التاريخ:</label>
<input type="text" id="date" readonly>

<label>المستودع:</label>
<select id="warehouse">
  <option>عنتاب</option>
  <option>باشبينر</option>
</select>

<label>اسم المادة:</label>
<input type="text" id="item">

<label>الكمية:</label>
<input type="number" id="qty">

<label>ملاحظات:</label>
<textarea id="notes"></textarea>

<button class="add" onclick="addItem()">➕ إضافة</button>
<button class="export" onclick="downloadCSV()">📊 تحميل Excel</button>

</div>

<table>
<thead>
<tr>
<th>تاريخ</th>
<th>مستودع</th>
<th>مادة</th>
<th>كمية</th>
<th>ملاحظات</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD1Vlv8Myo3fQtg0xywgdlU59QkVHGrck8",
  authDomain: "inventory-3d989.firebaseapp.com",
  projectId: "inventory-3d989",
  storageBucket: "inventory-3d989.firebasestorage.app",
  messagingSenderId: "6994794985",
  appId: "1:6994794985:web:0c73bb2055966c90ad1378"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("date").value = new Date().toLocaleDateString();

async function addItem() {
  let item = {
    date: document.getElementById("date").value,
    warehouse: document.getElementById("warehouse").value,
    name: document.getElementById("item").value,
    qty: document.getElementById("qty").value,
    notes: document.getElementById("notes").value
  };

  await addDoc(collection(db, "inventory"), item);
  loadData();
}

async function loadData() {
  const querySnapshot = await getDocs(collection(db, "inventory"));
  let table = document.getElementById("table");
  table.innerHTML = "";

  querySnapshot.forEach((doc) => {
    let d = doc.data();
    table.innerHTML += `
      <tr>
        <td>${d.date}</td>
        <td>${d.warehouse}</td>
        <td>${d.name}</td>
        <td>${d.qty}</td>
        <td>${d.notes}</td>
      </tr>
    `;
  });
}

window.addItem = addItem;

loadData();
</script>



</body>
</html>
