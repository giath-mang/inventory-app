<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>برنامج الجرد</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  direction: rtl;
}

input, select, textarea, button {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  font-size: 16px;
}

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

td, th {
  border: 1px solid #ccc;
  padding: 8px;
}
</style>

</head>

<body>

<h2>📦 برنامج الجرد</h2>

<label>التاريخ:</label>
<input type="text" id="date" readonly>

<label>المستودع:</label>
<select id="warehouse">
  <option>عنتاب</option>
  <option>باشبينر</option>
</select>

<label>اسم المادة:</label>
<input type="text" id="item">

<label>الكمية:</label>
<input type="number" id="qty">

<label>ملاحظات:</label>
<textarea id="notes"></textarea>

<button onclick="addItem()">➕ إضافة</button>

<table>
<thead>
<tr>
<th>تاريخ</th>
<th>مستودع</th>
<th>مادة</th>
<th>كمية</th>
<th>ملاحظات</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
document.getElementById("date").value = new Date().toLocaleDateString();

function addItem() {
  let date = document.getElementById("date").value;
  let warehouse = document.getElementById("warehouse").value;
  let item = document.getElementById("item").value;
  let qty = document.getElementById("qty").value;
  let notes = document.getElementById("notes").value;

  let row = `<tr>
    <td>${date}</td>
    <td>${warehouse}</td>
    <td>${item}</td>
    <td>${qty}</td>
    <td>${notes}</td>
  </tr>`;

  document.getElementById("table").innerHTML += row;

  saveData();
}

function saveData() {
  localStorage.setItem("inventory", document.getElementById("table").innerHTML);
}

function loadData() {
  let data = localStorage.getItem("inventory");
  if (data) {
    document.getElementById("table").innerHTML = data;
  }
}

loadData();
</script>

</body>
</html>
